name: Monatlicher Reset

on:
  schedule:
    - cron: '5 0 1 * *'
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken (data Branch)
        uses: actions/checkout@v4
        with:
          ref: data

      - name: data.json archivieren und zurücksetzen
        run: |
          PREV_MONTH=$(( $(date +%-m) - 2 ))
          PREV_YEAR=$(date +%Y)
          if [ $(date +%-m) -eq 1 ]; then
            PREV_MONTH=11
            PREV_YEAR=$(( $(date +%Y) - 1 ))
          elif [ $PREV_MONTH -lt 0 ]; then
            PREV_MONTH=11
          fi
          CURR_MONTH=$(( $(date +%-m) - 1 ))
          CURR_YEAR=$(date +%Y)

          python3 - << PYEOF
import json
prev_month = int("${PREV_MONTH}")
prev_year  = int("${PREV_YEAR}")
curr_month = int("${CURR_MONTH}")
curr_year  = int("${CURR_YEAR}")

try:
    with open('data.json','r') as f:
        d = json.load(f)
except:
    d = {'a':0,'b':0,'month':prev_month,'year':prev_year,'history':[],'archive':[]}

archive = d.get('archive', [])
if d.get('a', 0) > 0 or d.get('b', 0) > 0:
    archive.insert(0, {
        'month': d.get('month', prev_month),
        'year':  d.get('year',  prev_year),
        'a':     d.get('a', 0),
        'b':     d.get('b', 0)
    })
    if len(archive) > 24:
        archive = archive[:24]

result = {
    'a': 0, 'b': 0,
    'month': curr_month,
    'year':  curr_year,
    'history': [],
    'archive': archive
}
with open('data.json','w') as f:
    json.dump(result, f, indent=2, ensure_ascii=False)
print("Reset OK")
PYEOF

      - name: Commit & Push auf data Branch
        run: |
          git config user.name  "Seilsprung Bot"
          git config user.email "bot@seilsprung"
          git add data.json
          git commit -m "Reset: Neuer Monat $(date +%m/%Y)" || echo "Nichts zu committen"
          git push origin data
