name: Monatlicher Reset

on:
  schedule:
    - cron: '5 0 1 * *'
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: data.json zurücksetzen
        run: |
          MONTH_INDEX=$(( $(date +%-m) - 1 ))
          YEAR=$(date +%Y)
          cat > data.json << EOF
          {
            "a": 0,
            "b": 0,
            "month": ${MONTH_INDEX},
            "year": ${YEAR},
            "history": []
          }
          EOF

      - name: Commit & Push
        run: |
          git config user.name  "Seilsprung Bot"
          git config user.email "bot@seilsprung"
          git add data.json
          git commit -m "Reset: Neuer Monat $(date +%m/%Y)"
          git push
