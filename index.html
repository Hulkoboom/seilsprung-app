<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seilsprung Challenge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:        #f0f4ff;
  --surface:   #ffffff;
  --surface2:  #f7f9ff;
  --border:    #e2e8f8;
  --text:      #1a1f36;
  --text-mid:  #4a5280;
  --text-soft: #8890b0;
  --a:         #6c63ff;
  --a-light:   #ede9ff;
  --a-dark:    #4b44cc;
  --b:         #ff6b9d;
  --b-light:   #ffe4ef;
  --b-dark:    #cc4477;
  --green:     #22c97a;
  --amber:     #ffaa00;
  --red:       #ff5c5c;
  --shadow:    0 2px 12px rgba(108,99,255,0.08);
  --shadow-lg: 0 8px 32px rgba(108,99,255,0.13);
  --mono: 'DM Mono', monospace;
  --sans: 'Nunito', sans-serif;
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 1.5rem 1rem 3rem;
}

/* ── PIN SCREEN ─────────────────────────── */
#pin-screen {
  width: 100%; max-width: 340px;
  text-align: center;
  padding-top: 3rem;
}

.logo-wrap { margin-bottom: 1.5rem; }
.logo-circle {
  width: 72px; height: 72px; border-radius: 24px;
  background: linear-gradient(135deg, var(--a), var(--b));
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1rem; font-size: 32px;
  box-shadow: var(--shadow-lg);
}
.logo-title {
  font-size: 1.3rem; font-weight: 800; color: var(--text);
  letter-spacing: -0.02em;
}
.logo-sub {
  font-size: 0.8rem; color: var(--text-soft);
  margin-top: 2px;
}

.pin-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 1.75rem 1.5rem;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.pin-label {
  font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-soft); margin-bottom: 1.25rem;
}

.pin-dots {
  display: flex; justify-content: center; gap: 12px; margin-bottom: 1.5rem;
}

.pin-dot {
  width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid var(--border); background: transparent;
  transition: all 0.15s;
}
.pin-dot.filled        { border-color: var(--text-mid); background: var(--text-mid); transform: scale(1.2); }
.pin-dot.filled.user-a { border-color: var(--a); background: var(--a); }
.pin-dot.filled.user-b { border-color: var(--b); background: var(--b); }

.numpad {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 1rem;
}

.num-btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-family: var(--mono); font-size: 1.2rem; font-weight: 500;
  padding: 15px 0; cursor: pointer;
  transition: all 0.1s; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.num-btn:hover  { background: var(--a-light); border-color: var(--a); color: var(--a); }
.num-btn:active { transform: scale(0.93); }
.num-btn.del    { font-size: 0.9rem; color: var(--text-soft); }

.pin-error {
  font-size: 0.78rem; font-weight: 600;
  color: var(--red); min-height: 1.2em;
}

/* ── MAIN APP ────────────────────────────── */
#app { width: 100%; max-width: 420px; display: none; padding-top: 1rem; }

/* Header */
.app-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 1.5rem;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--a), var(--b));
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.header-title { font-size: 1rem; font-weight: 800; color: var(--text); }
.header-month { font-size: 0.7rem; color: var(--text-soft); }

.header-right { display: flex; align-items: center; gap: 8px; }

.user-badge {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
  padding: 4px 12px; border-radius: 20px;
}
.user-badge.user-a { background: var(--a-light); color: var(--a-dark); }
.user-badge.user-b { background: var(--b-light); color: var(--b-dark); }

.logout-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: background 0.15s;
}
.logout-icon:hover { background: var(--border); }

/* Score cards */
.scores { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }

.score-card {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 1.1rem 0.9rem;
  text-align: center; position: relative;
  box-shadow: var(--shadow); transition: all 0.2s;
}
.score-card.is-me.user-a { border-color: var(--a); background: var(--a-light); }
.score-card.is-me.user-b { border-color: var(--b); background: var(--b-light); }
.score-card.leading-a    { border-color: var(--a); }
.score-card.leading-b    { border-color: var(--b); }

.card-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 800; margin: 0 auto 0.5rem;
}
.card-avatar.user-a { background: var(--a); color: white; }
.card-avatar.user-b { background: var(--b); color: white; }

.card-name {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text-soft); margin-bottom: 0.3rem;
}
.card-score {
  font-family: var(--mono); font-size: 2.6rem;
  font-weight: 500; line-height: 1;
}
.card-score.user-a { color: var(--a); }
.card-score.user-b { color: var(--b); }
.card-unit { font-size: 0.62rem; color: var(--text-soft); font-weight: 600; text-transform: uppercase; margin-top: 2px; }

.lead-badge {
  position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
  font-size: 0.58rem; font-weight: 800; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 2px 9px; border-radius: 20px; white-space: nowrap;
}
.lead-badge.user-a { background: var(--a); color: white; }
.lead-badge.user-b { background: var(--b); color: white; }

/* Progress */
.progress-wrap {
  height: 8px; background: var(--border); border-radius: 8px;
  overflow: hidden; margin-bottom: 1.25rem; position: relative;
}
.progress-a {
  height: 100%;
  background: linear-gradient(90deg, var(--a), var(--b));
  transition: width 0.6s cubic-bezier(.4,0,.2,1);
  border-radius: 8px;
}

/* NAV TABS */
.nav-tabs {
  display: flex; gap: 6px; margin-bottom: 1rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 4px;
}
.nav-tab {
  flex: 1; padding: 7px; border: none; border-radius: 9px;
  font-family: var(--sans); font-size: 0.75rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s; background: transparent;
  color: var(--text-soft);
}
.nav-tab.active { background: var(--a); color: white; box-shadow: 0 2px 8px rgba(108,99,255,0.3); }

/* PANELS */
.panel { display: none; }
.panel.active { display: block; }

/* Input */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.1rem;
  margin-bottom: 1rem; box-shadow: var(--shadow);
}
.card-title {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--text-soft); margin-bottom: 0.75rem;
}
.input-row { display: flex; gap: 8px; align-items: center; }

.jump-input {
  flex: 1; background: var(--surface2); border: 2px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: var(--mono);
  font-size: 1.3rem; padding: 9px 12px; outline: none;
  transition: border-color 0.15s; -webkit-appearance: none; min-width: 0;
}
.jump-input:focus { border-color: var(--a); }
.jump-input.user-b:focus { border-color: var(--b); }

.add-btn {
  padding: 9px 16px; border: none; border-radius: 10px;
  font-family: var(--sans); font-size: 0.82rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
}
.add-btn:active   { transform: scale(0.94); }
.add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.add-btn.user-a   { background: var(--a); color: white; box-shadow: 0 3px 10px rgba(108,99,255,0.35); }
.add-btn.user-b   { background: var(--b); color: white; box-shadow: 0 3px 10px rgba(255,107,157,0.35); }

/* History list */
.history-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.history-item:last-child { border-bottom: none; }
.hist-left    { display: flex; align-items: center; gap: 8px; }
.hist-dot     { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.hist-dot.user-a { background: var(--a); }
.hist-dot.user-b { background: var(--b); }
.hist-name    { font-size: 0.75rem; font-weight: 700; color: var(--text-mid); }
.hist-count   { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; }
.hist-count.user-a { color: var(--a); }
.hist-count.user-b { color: var(--b); }
.hist-time    { font-family: var(--mono); font-size: 0.68rem; color: var(--text-soft); }
.hist-right   { display: flex; align-items: center; gap: 8px; }

.edit-btn {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s; flex-shrink: 0;
}
.edit-btn:hover { background: var(--a-light); border-color: var(--a); }

.no-history { font-size: 0.8rem; color: var(--text-soft); padding: 0.5rem 0; text-align: center; }

/* Edit modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,31,54,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 1rem;
}
.modal {
  background: var(--surface); border-radius: var(--radius);
  padding: 1.5rem; width: 100%; max-width: 300px;
  box-shadow: var(--shadow-lg);
}
.modal h3 { font-size: 1rem; font-weight: 800; margin-bottom: 0.4rem; }
.modal p  { font-size: 0.8rem; color: var(--text-soft); margin-bottom: 1rem; }
.modal input {
  width: 100%; background: var(--surface2); border: 2px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: var(--mono);
  font-size: 1.3rem; padding: 9px 12px; outline: none; margin-bottom: 1rem;
  -webkit-appearance: none;
}
.modal input:focus { border-color: var(--a); }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button {
  flex: 1; padding: 9px; border: 1px solid var(--border); border-radius: 10px;
  font-family: var(--sans); font-size: 0.82rem; font-weight: 700;
  cursor: pointer; background: var(--surface2); color: var(--text);
  transition: all 0.1s;
}
.modal-btns .btn-save { background: var(--a); color: white; border-color: var(--a); }
.modal-btns .btn-del  { background: var(--red); color: white; border-color: var(--red); }

/* ARCHIV */
.archive-month {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.1rem;
  margin-bottom: 0.75rem; box-shadow: var(--shadow);
}
.archive-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.75rem;
}
.archive-month-name { font-size: 0.85rem; font-weight: 800; color: var(--text); }
.archive-winner {
  font-size: 0.68rem; font-weight: 700; padding: 2px 8px;
  border-radius: 20px;
}
.archive-winner.user-a { background: var(--a-light); color: var(--a-dark); }
.archive-winner.user-b { background: var(--b-light); color: var(--b-dark); }
.archive-winner.draw   { background: var(--border); color: var(--text-soft); }

.archive-scores { display: flex; gap: 8px; }
.archive-score {
  flex: 1; border-radius: 10px; padding: 8px;
  text-align: center; background: var(--surface2);
}
.archive-score.user-a { background: var(--a-light); }
.archive-score.user-b { background: var(--b-light); }
.archive-score-name { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-soft); }
.archive-score-val  { font-family: var(--mono); font-size: 1.4rem; font-weight: 500; }
.archive-score.user-a .archive-score-val { color: var(--a); }
.archive-score.user-b .archive-score-val { color: var(--b); }

.no-archive { text-align: center; padding: 2rem; color: var(--text-soft); font-size: 0.85rem; }

/* Toast */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text); color: white;
  border-radius: 12px; padding: 10px 20px;
  font-size: 0.82rem; font-weight: 600;
  opacity: 0; transition: all 0.25s;
  pointer-events: none; white-space: nowrap; z-index: 300;
  box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); }
.toast.error   { background: var(--red); }

/* Sync indicator */
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); display: inline-block; margin-left: 4px;
  transition: background 0.3s;
}
.sync-dot.syncing { background: var(--amber); animation: pulse 0.8s infinite; }
.sync-dot.error   { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="logo-wrap">
    <div class="logo-circle">🪢</div>
    <div class="logo-title">Seilsprung</div>
    <div class="logo-sub">Challenge</div>
  </div>
  <div class="pin-card">
    <div class="pin-label">PIN eingeben</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="pressKey('1')">1</button>
      <button class="num-btn" onclick="pressKey('2')">2</button>
      <button class="num-btn" onclick="pressKey('3')">3</button>
      <button class="num-btn" onclick="pressKey('4')">4</button>
      <button class="num-btn" onclick="pressKey('5')">5</button>
      <button class="num-btn" onclick="pressKey('6')">6</button>
      <button class="num-btn" onclick="pressKey('7')">7</button>
      <button class="num-btn" onclick="pressKey('8')">8</button>
      <button class="num-btn" onclick="pressKey('9')">9</button>
      <div></div>
      <button class="num-btn" onclick="pressKey('0')">0</button>
      <button class="num-btn del" onclick="pressKey('del')">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="app-header">
    <div class="header-left">
      <div class="header-logo">🪢</div>
      <div>
        <div class="header-title">Seilsprung</div>
        <div class="header-month" id="month-label"></div>
      </div>
    </div>
    <div class="header-right">
      <div class="user-badge" id="user-badge"></div>
      <span class="sync-dot" id="sync-dot" title="Sync-Status"></span>
      <div class="logout-icon" onclick="logout()" title="Abmelden">↩</div>
    </div>
  </div>

  <!-- Score cards -->
  <div class="scores" id="scores-container"></div>

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="progress-a" id="progress-bar" style="width:50%"></div>
  </div>

  <!-- Tabs -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('eingabe')">Eingabe</button>
    <button class="nav-tab" onclick="switchTab('verlauf')">Verlauf</button>
    <button class="nav-tab" onclick="switchTab('archiv')">Archiv</button>
  </div>

  <!-- Panel: Eingabe -->
  <div class="panel active" id="panel-eingabe">
    <div class="card">
      <div class="card-title" id="input-label">Sprünge eintragen</div>
      <div class="input-row">
        <input class="jump-input" id="jump-input" type="number"
               min="1" max="9999" placeholder="z.B. 50" inputmode="numeric">
        <button class="add-btn" id="add-btn" onclick="addJumps()">+ Eintragen</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Letzte Einträge</div>
      <div id="history-list-short"></div>
    </div>
  </div>

  <!-- Panel: Verlauf -->
  <div class="panel" id="panel-verlauf">
    <div class="card">
      <div class="card-title">Alle Einträge diesen Monat</div>
      <div id="history-list-full"></div>
    </div>
  </div>

  <!-- Panel: Archiv -->
  <div class="panel" id="panel-archiv">
    <div id="archive-list"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <h3>Eintrag bearbeiten</h3>
    <p id="modal-info">Sprünge korrigieren oder Eintrag löschen.</p>
    <input type="number" id="modal-input" min="1" max="9999" inputmode="numeric">
    <div class="modal-btns">
      <button onclick="closeEditModal()">Abbrechen</button>
      <button class="btn-del" onclick="deleteEntry()">Löschen</button>
      <button class="btn-save" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── KONFIGURATION (wird beim Deploy automatisch befüllt) ──────
const CONFIG = {
  users: {
    a: { name: "__NAME_A__", pin: "__PIN_A__", color: "user-a" },
    b: { name: "__NAME_B__", pin: "__PIN_B__", color: "user-b" }
  },
  github: {
    owner: "__GH_OWNER__",
    repo:  "__GH_REPO__",
    token: "__GH_TOKEN__",
    // data.json liegt auf dem 'data' Branch – wird NIE vom Deploy überschrieben
    branch: "data",
    file:   "data.json"
  }
};

// ── STATE ─────────────────────────────────────────────────────
let currentUser  = null;
let pinBuffer    = "";
let appData      = null;
let editIndex    = -1;
let activeTab    = "eingabe";

const MONTHS = ["Januar","Februar","März","April","Mai","Juni",
                "Juli","August","September","Oktober","November","Dezember"];

// ── PIN ───────────────────────────────────────────────────────
function pressKey(k) {
  document.getElementById("pin-error").textContent = "";
  if (k === "del") { pinBuffer = pinBuffer.slice(0,-1); renderDots(null); return; }
  if (pinBuffer.length >= 4) return;
  pinBuffer += k; renderDots(null);
  if (pinBuffer.length === 4) setTimeout(checkPin, 130);
}

function renderDots(cls) {
  document.querySelectorAll(".pin-dot").forEach((d,i) => {
    d.classList.remove("filled","user-a","user-b");
    if (i < pinBuffer.length) { d.classList.add("filled"); if (cls) d.classList.add(cls); }
  });
}

function checkPin() {
  let matched = null;
  for (const [k,u] of Object.entries(CONFIG.users)) {
    if (pinBuffer === u.pin) { matched = k; break; }
  }
  if (matched) {
    renderDots(CONFIG.users[matched].color);
    setTimeout(() => {
      currentUser = matched;
      sessionStorage.setItem("seil_user", matched);
      document.getElementById("pin-screen").style.display = "none";
      document.getElementById("app").style.display = "block";
      loadData();
    }, 280);
  } else {
    document.getElementById("pin-error").textContent = "Falscher PIN";
    const dots = document.getElementById("pin-dots");
    [0,9,-9,9,-9,0].forEach((v,i) => setTimeout(() => dots.style.transform=`translateX(${v}px)`,i*50));
    setTimeout(() => { dots.style.transform=""; }, 320);
    pinBuffer = ""; renderDots(null);
  }
}

// ── SYNC DOT ─────────────────────────────────────────────────
function setSyncState(state) {
  const d = document.getElementById("sync-dot");
  d.className = "sync-dot" + (state==="syncing" ? " syncing" : state==="error" ? " error" : "");
}

// ── DATEN LADEN ───────────────────────────────────────────────
async function loadData() {
  setSyncState("syncing");
  try {
    const branch = CONFIG.github.branch;
    const url = `https://raw.githubusercontent.com/${CONFIG.github.owner}/${CONFIG.github.repo}/${branch}/${CONFIG.github.file}?t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    appData = await res.json();

    // Monatscheck – neuer Monat → alten Monat archivieren
    const now = new Date();
    if (appData.month !== now.getMonth() || appData.year !== now.getFullYear()) {
      // Alten Monat ins Archiv schieben
      appData.archive = appData.archive || [];
      if (appData.a > 0 || appData.b > 0) {
        appData.archive.unshift({
          month: appData.month, year: appData.year,
          a: appData.a, b: appData.b
        });
        if (appData.archive.length > 24) appData.archive = appData.archive.slice(0,24);
      }
      appData.a = 0; appData.b = 0;
      appData.month = now.getMonth(); appData.year = now.getFullYear();
      appData.history = [];
      await saveData("auto-reset: neuer Monat");
    }
    setSyncState("ok");
    renderAll();
  } catch(e) {
    console.warn("Laden fehlgeschlagen:", e);
    if (!appData) {
      appData = { a:0, b:0, month: new Date().getMonth(),
                  year: new Date().getFullYear(), history:[], archive:[] };
    }
    setSyncState("error");
    renderAll();
    showToast("Verbindungsfehler beim Laden", "error");
  }
}

// ── DATEN SPEICHERN ───────────────────────────────────────────
async function saveData(commitMsg) {
  setSyncState("syncing");
  try {
    const branch  = CONFIG.github.branch;
    const headers = {
      Authorization: `Bearer ${CONFIG.github.token}`,
      Accept: "application/vnd.github+json",
      "Content-Type": "application/json"
    };
    // SHA holen
    const metaRes = await fetch(
      `https://api.github.com/repos/${CONFIG.github.owner}/${CONFIG.github.repo}/contents/${CONFIG.github.file}?ref=${branch}`,
      { headers }
    );
    let sha;
    if (metaRes.ok) sha = (await metaRes.json()).sha;

    const msg = commitMsg || `update: ${CONFIG.users[currentUser]?.name || "bot"} — ${new Date().toLocaleDateString("de-DE")}`;
    const body = {
      message: msg,
      branch:  branch,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(appData, null, 2)))),
      ...(sha ? { sha } : {})
    };

    const res = await fetch(
      `https://api.github.com/repos/${CONFIG.github.owner}/${CONFIG.github.repo}/contents/${CONFIG.github.file}`,
      { method:"PUT", headers, body: JSON.stringify(body) }
    );
    if (res.ok) { setSyncState("ok"); return true; }
    throw new Error("API " + res.status);
  } catch(e) {
    console.error("Speichern fehlgeschlagen:", e);
    setSyncState("error");
    return false;
  }
}

// ── SPRÜNGE EINTRAGEN ─────────────────────────────────────────
async function addJumps() {
  const input = document.getElementById("jump-input");
  const val   = parseInt(input.value);
  if (!val || val < 1 || val > 9999) {
    showToast("Bitte 1–9999 eingeben", "error"); input.focus(); return;
  }
  const btn = document.getElementById("add-btn");
  btn.textContent = "Speichert…"; btn.disabled = true;

  appData[currentUser] = (appData[currentUser] || 0) + val;
  appData.history = appData.history || [];
  appData.history.push({
    id: Date.now(),
    user: currentUser, count: val,
    time: new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}),
    date: new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})
  });
  if (appData.history.length > 50) appData.history = appData.history.slice(-50);

  renderAll(); input.value = "";
  const ok = await saveData();
  btn.textContent = "+ Eintragen"; btn.disabled = false;
  showToast(ok ? `✓ +${val} Sprünge gespeichert!` : "Speichern fehlgeschlagen – bitte erneut versuchen", ok ? "success" : "error");
}

// ── EINTRAG BEARBEITEN ────────────────────────────────────────
function openEditModal(idx) {
  const h = appData.history[idx];
  // Nur eigene Einträge bearbeiten
  if (h.user !== currentUser) {
    showToast("Du kannst nur deine eigenen Einträge bearbeiten", "error"); return;
  }
  editIndex = idx;
  document.getElementById("modal-info").textContent =
    `${CONFIG.users[h.user].name} · ${h.date} ${h.time} · aktuell: ${h.count} Sprünge`;
  document.getElementById("modal-input").value = h.count;
  document.getElementById("edit-modal").style.display = "flex";
  setTimeout(() => document.getElementById("modal-input").focus(), 100);
}

function closeEditModal() {
  document.getElementById("edit-modal").style.display = "none";
  editIndex = -1;
}

function closeModal(e) {
  if (e.target.id === "edit-modal") closeEditModal();
}

async function saveEdit() {
  const val = parseInt(document.getElementById("modal-input").value);
  if (!val || val < 1 || val > 9999) {
    showToast("Bitte 1–9999 eingeben", "error"); return;
  }
  const h = appData.history[editIndex];
  const diff = val - h.count;
  appData[h.user] = Math.max(0, (appData[h.user] || 0) + diff);
  appData.history[editIndex].count = val;
  closeEditModal();
  renderAll();
  const ok = await saveData();
  showToast(ok ? "✓ Eintrag aktualisiert" : "Speichern fehlgeschlagen", ok ? "success" : "error");
}

async function deleteEntry() {
  const h = appData.history[editIndex];
  appData[h.user] = Math.max(0, (appData[h.user] || 0) - h.count);
  appData.history.splice(editIndex, 1);
  closeEditModal();
  renderAll();
  const ok = await saveData();
  showToast(ok ? "✓ Eintrag gelöscht" : "Speichern fehlgeschlagen", ok ? "success" : "error");
}

// ── TABS ─────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".nav-tab").forEach((t,i) => {
    const tabs = ["eingabe","verlauf","archiv"];
    t.classList.toggle("active", tabs[i] === tab);
  });
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-" + tab).classList.add("active");
}

// ── RENDER ────────────────────────────────────────────────────
function renderAll() {
  if (!appData || !currentUser) return;
  const u = CONFIG.users, now = new Date();

  // Header
  document.getElementById("month-label").textContent =
    MONTHS[appData.month ?? now.getMonth()] + " " + (appData.year ?? now.getFullYear());
  const badge = document.getElementById("user-badge");
  badge.textContent = u[currentUser].name;
  badge.className = "user-badge " + u[currentUser].color;

  // Score cards
  const sA = appData.a||0, sB = appData.b||0, total = sA+sB;
  const leading = sA>sB?"a":sB>sA?"b":null;
  document.getElementById("scores-container").innerHTML = ["a","b"].map(k => {
    const isMe = k===currentUser, lding = leading===k;
    const cls = ["score-card",isMe?"is-me":"",isMe?u[k].color:"",lding?`leading-${k}`:""].filter(Boolean).join(" ");
    const initials = u[k].name.slice(0,2).toUpperCase();
    return `<div class="${cls}">
      ${lding?`<div class="lead-badge ${u[k].color}">🏆 Führt</div>`:""}
      <div class="card-avatar ${u[k].color}">${initials}</div>
      <div class="card-name">${u[k].name}</div>
      <div class="card-score ${u[k].color}">${appData[k]||0}</div>
      <div class="card-unit">Sprünge</div>
    </div>`;
  }).join("");

  // Progress
  const pct = total===0?50:Math.round(sA/total*100);
  document.getElementById("progress-bar").style.width = pct+"%";

  // Input label
  document.getElementById("input-label").textContent = `Sprünge eintragen — ${u[currentUser].name}`;
  document.getElementById("jump-input").className = "jump-input " + u[currentUser].color;
  document.getElementById("add-btn").className = "add-btn " + u[currentUser].color;

  // History (short – Eingabe Tab)
  renderHistoryList("history-list-short", 5);
  // History (full – Verlauf Tab)
  renderHistoryList("history-list-full", 50);

  // Archiv
  renderArchive();
}

function renderHistoryList(elId, limit) {
  const u    = CONFIG.users;
  const hist = (appData.history||[]).slice().reverse().slice(0, limit);
  const el   = document.getElementById(elId);
  if (hist.length === 0) {
    el.innerHTML = '<div class="no-history">Noch keine Einträge diesen Monat</div>'; return;
  }
  el.innerHTML = hist.map((h, i) => {
    // Originalindex im Array (nicht reversed)
    const origIdx = appData.history.length - 1 - i;
    const canEdit = h.user === currentUser;
    return `<div class="history-item">
      <div class="hist-left">
        <div class="hist-dot ${u[h.user].color}"></div>
        <div class="hist-name">${u[h.user].name}</div>
      </div>
      <div class="hist-right">
        <div class="hist-count ${u[h.user].color}">+${h.count}</div>
        <div class="hist-time">${h.date} ${h.time}</div>
        ${canEdit ? `<button class="edit-btn" onclick="openEditModal(${origIdx})" title="Bearbeiten">✏</button>` : '<div style="width:24px"></div>'}
      </div>
    </div>`;
  }).join("");
}

function renderArchive() {
  const archive = appData.archive || [];
  const el = document.getElementById("archive-list");
  if (archive.length === 0) {
    el.innerHTML = '<div class="no-archive">Noch keine abgeschlossenen Monate.<br>Das Archiv füllt sich automatisch am Monatsende.</div>';
    return;
  }
  const u = CONFIG.users;
  el.innerHTML = archive.map(m => {
    const winner = m.a > m.b ? "a" : m.b > m.a ? "b" : null;
    const winLabel = winner ? `🏆 ${u[winner].name}` : "Unentschieden";
    const winClass = winner ? u[winner].color : "draw";
    return `<div class="archive-month">
      <div class="archive-header">
        <div class="archive-month-name">${MONTHS[m.month]} ${m.year}</div>
        <div class="archive-winner ${winClass}">${winLabel}</div>
      </div>
      <div class="archive-scores">
        <div class="archive-score user-a">
          <div class="archive-score-name">${u.a.name}</div>
          <div class="archive-score-val">${m.a}</div>
        </div>
        <div class="archive-score user-b">
          <div class="archive-score-name">${u.b.name}</div>
          <div class="archive-score-val">${m.b}</div>
        </div>
      </div>
    </div>`;
  }).join("");
}

// ── LOGOUT / HELPERS ──────────────────────────────────────────
function logout() {
  currentUser=null; pinBuffer=""; appData=null;
  sessionStorage.removeItem("seil_user");
  document.getElementById("app").style.display="none";
  document.getElementById("pin-screen").style.display="block";
  renderDots(null); switchTab("eingabe");
}

function showToast(msg, type="") {
  const t = document.getElementById("toast");
  t.textContent=msg; t.className="toast show"+(type?" "+type:"");
  setTimeout(()=>t.className="toast",2800);
}

document.addEventListener("keydown", e => {
  if (document.getElementById("app").style.display!=="none") {
    if (e.key==="Enter") addJumps(); return;
  }
  if (e.key>="0"&&e.key<="9") pressKey(e.key);
  if (e.key==="Backspace") pressKey("del");
});

// Session wiederherstellen
const saved = sessionStorage.getItem("seil_user");
if (saved && CONFIG.users[saved]) {
  currentUser=saved;
  document.getElementById("pin-screen").style.display="none";
  document.getElementById("app").style.display="block";
  loadData();
}
</script>
